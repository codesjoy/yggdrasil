yggdrasil:
  admin:
    application:
      namespace: "dev"
  clients:
    defaults:
      interceptors:
        unary:
          - "logging"
        stream:
          - "logging"
    services:
      github.com.codesjoy.yggdrasil.example.advanced.load-balancing:
        balancer: "round_robin"
        remote:
          endpoints:
            - address: "127.0.0.1:55884"
              protocol: "grpc"
            - address: "127.0.0.1:55885"
              protocol: "grpc"
            - address: "127.0.0.1:55886"
              protocol: "grpc"
  logging:
    remote_level: debug
    interceptors:
      logging:
        print_req_and_res: true
