syntax = "proto3";

package codesjoy.yggdrasil.example.proto.errorhandling;

import "error-handling/reason.proto";

option go_package = "github.com/codesjoy/yggdrasil/v3/examples/protogen/error-handling;error_handling";

// Library management service - demonstrates comprehensive error handling
service LibraryService {
  // User management
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc AuthenticateUser(AuthenticateUserRequest) returns (AuthenticateUserResponse);

  // Book management
  rpc CreateBook(CreateBookRequest) returns (CreateBookResponse);
  rpc GetBook(GetBookRequest) returns (GetBookResponse);
  rpc BorrowBook(BorrowBookRequest) returns (BorrowBookResponse);
  rpc ReturnBook(ReturnBookRequest) returns (ReturnBookResponse);

  // Shelf management
  rpc CreateShelf(CreateShelfRequest) returns (CreateShelfResponse);
  rpc AddBookToShelf(AddBookToShelfRequest) returns (AddBookToShelfResponse);

  // Test endpoint - triggers specific errors
  rpc TriggerError(TriggerErrorRequest) returns (TriggerErrorResponse);
}

// Message definitions
message CreateUserRequest {
  string email = 1;
  string name = 2;
  string password = 3;
}

message CreateUserResponse {
  User user = 1;
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  User user = 1;
}

message AuthenticateUserRequest {
  string email = 1;
  string password = 2;
}

message AuthenticateUserResponse {
  User user = 1;
  string token = 2;
}

message CreateBookRequest {
  string title = 1;
  string author = 2;
  string isbn = 3;
}

message CreateBookResponse {
  Book book = 1;
}

message GetBookRequest {
  string book_id = 1;
}

message GetBookResponse {
  Book book = 1;
}

message BorrowBookRequest {
  string book_id = 1;
  string user_id = 2;
}

message BorrowBookResponse {
  bool success = 1;
}

message ReturnBookRequest {
  string book_id = 1;
}

message ReturnBookResponse {
  bool success = 1;
}

message CreateShelfRequest {
  string name = 1;
  int32 capacity = 2;
}

message CreateShelfResponse {
  Shelf shelf = 1;
}

message AddBookToShelfRequest {
  string shelf_id = 1;
  string book_id = 2;
}

message AddBookToShelfResponse {
  bool success = 1;
}

message TriggerErrorRequest {
  string error_type = 1; // "database_error", "network_error", "internal_error"
}

message TriggerErrorResponse {
  string message = 1;
}

// Data models
message User {
  string id = 1;
  string email = 2;
  string name = 3;
}

message Book {
  string id = 1;
  string title = 2;
  string author = 3;
  string isbn = 4;
  string borrower_id = 5;
}

message Shelf {
  string id = 1;
  string name = 2;
  int32 capacity = 3;
  int32 current_count = 4;
}
