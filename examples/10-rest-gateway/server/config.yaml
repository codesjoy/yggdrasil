yggdrasil:
  app:
    name: "github.com.codesjoy.yggdrasil.example.10-rest-gateway"
  server:
    transports:
      - "grpc"
    interceptors:
      unary:
        - "logging"
      stream:
        - "logging"

  transports:
    grpc:
      server:
        address: "127.0.0.1:55888"
    http:
      rest:
        port: 55887
        host: 127.0.0.1
        middleware:
          all:
            - "logger"

  observability:
    logging:
      interceptors:
        logging:
          print_req_and_res: true
      handlers:
        default:
          type: "text"
          config:
            level: "debug"
      writers:
        default:
          type: "console"
