syntax = "proto3";

package codesjoy.yggdrasil.example.proto.errorhandling;

import "codesjoy/yggdrasil/reason/reason.proto";

option go_package = "github.com/codesjoy/yggdrasil/v2/example/protogen/error-handling;error_handling";

enum Reason {
  option (codesjoy.yggdrasil.reason.default_reason) = 500;

  // Default unspecified error
  ERROR_REASON_UNSPECIFIED = 0;

  // User errors (4xx)
  USER_NOT_FOUND = 10 [(codesjoy.yggdrasil.reason.code) = NOT_FOUND];
  INVALID_CREDENTIALS = 11 [(codesjoy.yggdrasil.reason.code) = UNAUTHENTICATED];
  INVALID_INPUT = 12 [(codesjoy.yggdrasil.reason.code) = INVALID_ARGUMENT];
  EMAIL_ALREADY_EXISTS = 13 [(codesjoy.yggdrasil.reason.code) = ALREADY_EXISTS];

  // Resource errors (4xx)
  BOOK_NOT_FOUND = 20 [(codesjoy.yggdrasil.reason.code) = NOT_FOUND];
  SHELF_NOT_FOUND = 21 [(codesjoy.yggdrasil.reason.code) = NOT_FOUND];
  BOOK_ALREADY_BORROWED = 22 [(codesjoy.yggdrasil.reason.code) = FAILED_PRECONDITION];
  SHELF_FULL = 23 [(codesjoy.yggdrasil.reason.code) = RESOURCE_EXHAUSTED];

  // System errors (5xx)
  INTERNAL_ERROR = 100 [(codesjoy.yggdrasil.reason.code) = INTERNAL];
  DATABASE_ERROR = 101 [(codesjoy.yggdrasil.reason.code) = UNAVAILABLE];
  NETWORK_ERROR = 102 [(codesjoy.yggdrasil.reason.code) = UNAVAILABLE];
}
