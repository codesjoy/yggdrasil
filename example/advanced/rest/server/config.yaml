yggdrasil:
  server:
    protocol:
      - "grpc"

  rest:
    enable: true
    port: 55887
    host: 127.0.0.1
    middleware:
      all:
        - "logger"

  remote:
    protocol:
      grpc:
        address: "127.0.0.1:55888"

  interceptor:
    unary_server: "logging"
    stream_server: "logging"
    config:
      logging:
        print_req_and_res: true

  logger:
    handler:
      default:
        type: "console"
        level: "debug"
    writer:
      default:
        type: "console"
