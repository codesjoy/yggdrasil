yggdrasil:
  application:
    namespace: "dev"
  client:
    github.com.codesjoy.yggdrasil.example.advanced.load-balancing:
      balancer: "round_robin"
      remote:
        endpoints:
          - address: "127.0.0.1:55884"
            protocol: "grpc"
          - address: "127.0.0.1:55885"
            protocol: "grpc"
          - address: "127.0.0.1:55886"
            protocol: "grpc"
  interceptor:
    unary_client: "logging"
    stream_client: "logging"
    config:
      logging:
        print_req_and_res: true

  remote:
    logger_level: debug
